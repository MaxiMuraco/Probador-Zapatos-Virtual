<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probador Virtual de Zapatos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; }
    h1 { text-align: center; font-size: 20px; font-weight: 500; padding: 20px 0 4px; }
    #subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 16px; }
    #viewfinder {
      position: relative; width: 100%; max-width: 600px;
      margin: 0 auto; border-radius: 12px; overflow: hidden;
      background: #000; aspect-ratio: 4/3;
    }
    #webcam { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #flipBtn {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      background: rgba(0,0,0,0.5); color: #fff; border: none;
      border-radius: 8px; padding: 8px 12px; font-size: 20px; cursor: pointer;
    }
    #status { text-align: center; font-size: 13px; color: #555; margin: 10px 0 14px; min-height: 18px; }
    #startBtn {
      display: block; margin: 0 auto 16px; padding: 10px 32px;
      border: 1px solid #ccc; border-radius: 8px; background: #fff;
      cursor: pointer; font-size: 14px; transition: background 0.15s;
    }
    #startBtn:hover { background: #f0f0f0; }
    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #shoes {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 14px; padding: 0 16px;
    }
    .shoe-btn {
      padding: 8px 18px; border: 1px solid #ccc; border-radius: 8px;
      background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s;
    }
    .shoe-btn:hover { background: #f0f0f0; }
    .shoe-btn.active { border-color: #378ADD; background: #E6F1FB; color: #0C447C; font-weight: 500; }
    #controls { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 10px; }
    #controls label { font-size: 13px; color: #666; }
    #scaleSlider { width: 130px; }
    #scaleVal { font-size: 13px; font-weight: 500; min-width: 36px; }
    #tip { text-align: center; font-size: 12px; color: #999; padding: 0 16px 24px; max-width: 500px; margin: 0 auto; }
    .wrapper { max-width: 640px; margin: 0 auto; padding: 0 16px; }
  </style>
</head>
<body>

<h1>Probador Virtual de Zapatos</h1>
<p id="subtitle">Mostrá tus pies a la cámara y probate el calzado</p>

<div class="wrapper">
  <div id="viewfinder">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <button id="flipBtn" style="display:none">🔄</button>
  </div>
  <p id="status">Presioná "Activar cámara" para empezar</p>
  <button id="startBtn">Activar cámara</button>
  <div id="shoes">
    <button class="shoe-btn active" data-shoe="sneaker">👟 Zapatilla</button>
    <button class="shoe-btn" data-shoe="boot">🥾 Bota</button>
    <button class="shoe-btn" data-shoe="loafer">👞 Mocasín</button>
    <button class="shoe-btn" data-shoe="heel">👠 Taco</button>
  </div>
  <div id="controls">
    <label>Tamaño del zapato</label>
    <input type="range" id="scaleSlider" min="50" max="200" value="100" step="1">
    <span id="scaleVal">100%</span>
  </div>
  <p id="tip">Usá 🔄 para cambiar entre cámara frontal y trasera.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>

<script>
  const video       = document.getElementById('webcam');
  const canvas      = document.getElementById('overlay');
  const ctx         = canvas.getContext('2d');
  const statusEl    = document.getElementById('status');
  const startBtn    = document.getElementById('startBtn');
  const flipBtn     = document.getElementById('flipBtn');
  const scaleSlider = document.getElementById('scaleSlider');
  const scaleVal    = document.getElementById('scaleVal');

  let currentShoe   = 'sneaker';
  let userScale     = 1.0;
  let cameraStarted = false;
  let facingMode    = 'environment'; // arranca con trasera
  let poseInstance  = null;
  let currentStream = null;
  let loopRunning   = false;

  const shoeColors = {
    sneaker: { body:'#378ADD', sole:'#0C447C', lace:'#ffffff', label:'Zapatilla' },
    boot:    { body:'#5F5E5A', sole:'#2C2C2A', lace:'#B4B2A9', label:'Bota'     },
    loafer:  { body:'#854F0B', sole:'#412402', lace:'#EF9F27', label:'Mocasín'  },
    heel:    { body:'#D4537E', sole:'#4B1528', lace:'#F4C0D1', label:'Taco'     },
  };

  document.querySelectorAll('.shoe-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shoe-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentShoe = btn.dataset.shoe;
    });
  });

  scaleSlider.addEventListener('input', () => {
    userScale = parseInt(scaleSlider.value) / 100;
    scaleVal.textContent = scaleSlider.value + '%';
  });

  function drawShoe(cx, cy, angle, width, shoe, flip) {
    const c = shoeColors[shoe];
    const h = width * 0.38;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    if (flip) ctx.scale(-1, 1);
    ctx.scale(userScale, userScale);

    if (shoe === 'sneaker') {
      ctx.beginPath(); ctx.ellipse(0,0,width*0.5,h*0.42,0,0,Math.PI*2);
      ctx.fillStyle=c.body; ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,h*0.28,width*0.52,h*0.22,0,0,Math.PI*2);
      ctx.fillStyle=c.sole; ctx.fill();
      for (let i=-2;i<=2;i++) {
        ctx.beginPath();
        ctx.moveTo(i*width*0.08,-h*0.1);
        ctx.lineTo(i*width*0.08+width*0.04,-h*0.35);
        ctx.strokeStyle=c.lace; ctx.lineWidth=width*0.025; ctx.stroke();
      }
      ctx.beginPath(); ctx.ellipse(width*0.28,-h*0.05,width*0.12,h*0.18,0.3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();

    } else if (shoe === 'boot') {
      ctx.beginPath(); ctx.roundRect(-width*0.48,-h*1.1,width*0.96,h*1.5,8);
      ctx.fillStyle=c.body; ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,h*0.38,width*0.5,h*0.2,0,0,Math.PI*2);
      ctx.fillStyle=c.sole; ctx.fill();
      for (let i=0;i<4;i++) {
        ctx.beginPath();
        ctx.moveTo(-width*0.3,-h*0.3+i*h*0.18);
        ctx.lineTo(width*0.3,-h*0.3+i*h*0.18);
        ctx.strokeStyle=c.lace; ctx.lineWidth=width*0.018; ctx.stroke();
      }

    } else if (shoe === 'loafer') {
      ctx.beginPath();
      ctx.moveTo(-width*0.5,h*0.05);
      ctx.bezierCurveTo(-width*0.5,-h*0.55,width*0.5,-h*0.55,width*0.5,h*0.05);
      ctx.bezierCurveTo(width*0.5,h*0.35,-width*0.5,h*0.35,-width*0.5,h*0.05);
      ctx.fillStyle=c.body; ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,h*0.35,width*0.5,h*0.18,0,0,Math.PI*2);
      ctx.fillStyle=c.sole; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-width*0.15,-h*0.15);
      ctx.quadraticCurveTo(0,-h*0.45,width*0.15,-h*0.15);
      ctx.strokeStyle=c.lace; ctx.lineWidth=width*0.04; ctx.stroke();

    } else if (shoe === 'heel') {
      ctx.beginPath();
      ctx.moveTo(-width*0.45,h*0.1);
      ctx.bezierCurveTo(-width*0.5,-h*0.3,-width*0.1,-h*0.55,width*0.3,-h*0.45);
      ctx.bezierCurveTo(width*0.55,-h*0.35,width*0.5,h*0.1,width*0.45,h*0.1);
      ctx.closePath(); ctx.fillStyle=c.body; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(width*0.25,h*0.1); ctx.lineTo(width*0.38,h*0.55);
      ctx.lineTo(width*0.45,h*0.55); ctx.lineTo(width*0.38,h*0.1);
      ctx.fillStyle=c.sole; ctx.fill();
      ctx.beginPath(); ctx.ellipse(-width*0.05,h*0.12,width*0.32,h*0.1,0,0,Math.PI*2);
      ctx.fillStyle=c.sole; ctx.fill();
    }
    ctx.restore();
  }

  function onResults(results) {
    canvas.width  = video.videoWidth  || canvas.offsetWidth;
    canvas.height = video.videoHeight || canvas.offsetHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results.poseLandmarks) {
      statusEl.textContent = 'No se detectó ninguna persona. Mostrá el cuerpo completo.';
      return;
    }

    const lm=results.poseLandmarks, W=canvas.width, H=canvas.height;
    let detected=0;

    function drawFoot(heel, toe, flip) {
      if (!heel||!toe) return;
      if (heel.visibility<0.3 && toe.visibility<0.3) return;
      detected++;
      const hx=heel.x*W, hy=heel.y*H, tx=toe.x*W, ty=toe.y*H;
      const cx=(hx+tx)/2, cy=(hy+ty)/2;
      const dx=tx-hx, dy=ty-hy;
      drawShoe(cx,cy,Math.atan2(dy,dx),Math.max(Math.sqrt(dx*dx+dy*dy)*1.1,60),currentShoe,flip);
    }

    drawFoot(lm[29],lm[31],false);
    drawFoot(lm[30],lm[32],true);

    statusEl.textContent = detected>0
      ? `${detected} pie${detected>1?'s':''} detectado${detected>1?'s':''} — ${shoeColors[currentShoe].label}`
      : 'Mostrá los pies a la cámara';
  }

  async function startStream(facing) {
    // Parar stream anterior
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: facing }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });

    currentStream = stream;
    video.srcObject = stream;
    await new Promise(resolve => { video.onloadedmetadata = resolve; });
    await video.play();
  }

  async function processLoop() {
    if (poseInstance && video.readyState >= 2) {
      await poseInstance.send({ image: video });
    }
    requestAnimationFrame(processLoop);
  }

  // Botón para cambiar cámara
  flipBtn.addEventListener('click', async () => {
    flipBtn.disabled = true;
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    statusEl.textContent = facingMode === 'environment' ? 'Cambiando a cámara trasera...' : 'Cambiando a cámara frontal...';
    try {
      await startStream(facingMode);
      statusEl.textContent = facingMode === 'environment' ? '📷 Cámara trasera activa' : '🤳 Cámara frontal activa';
    } catch(e) {
      // Si exact falla, intentar con ideal
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: facingMode } },
          audio: false
        });
        currentStream = stream;
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = resolve; });
        await video.play();
        statusEl.textContent = facingMode === 'environment' ? '📷 Cámara trasera activa' : '🤳 Cámara frontal activa';
      } catch(e2) {
        statusEl.textContent = 'No se pudo cambiar la cámara: ' + e2.message;
        facingMode = facingMode === 'environment' ? 'user' : 'environment'; // revertir
      }
    }
    flipBtn.disabled = false;
  });

  startBtn.addEventListener('click', async () => {
    if (cameraStarted) return;
    cameraStarted = true;
    startBtn.disabled = true;
    startBtn.textContent = 'Iniciando...';
    statusEl.textContent = 'Solicitando acceso a la cámara...';

    try {
      await startStream(facingMode);

      statusEl.textContent = 'Cargando modelo de detección...';

      poseInstance = new Pose({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
      });
      poseInstance.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      poseInstance.onResults(onResults);

      startBtn.style.display = 'none';
      flipBtn.style.display = 'block';
      statusEl.textContent = '📷 Cámara trasera activa — mostrá los pies';
      processLoop();

    } catch (e) {
      // Si exact falla, probar con ideal
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        currentStream = stream;
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = resolve; });
        await video.play();

        poseInstance = new Pose({
          locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
        });
        poseInstance.setOptions({
          modelComplexity: 1, smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        poseInstance.onResults(onResults);

        startBtn.style.display = 'none';
        flipBtn.style.display = 'block';
        statusEl.textContent = 'Cámara activa — mostrá los pies';
        processLoop();

      } catch(e2) {
        statusEl.textContent = 'Error al acceder a la cámara: ' + e2.message;
        startBtn.disabled = false;
        startBtn.textContent = 'Reintentar';
        cameraStarted = false;
      }
    }
  });
</script>
</body>
</html>
