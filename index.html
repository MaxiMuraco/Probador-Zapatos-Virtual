<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probador de Zapatos</title>
<style>
body{font-family:Arial,sans-serif;text-align:center;background:#f5f5f5;margin:0;padding:20px}
#container{position:relative;max-width:800px;margin:auto}
video,canvas{width:100%;border-radius:12px}
canvas{position:absolute;left:0;top:0}
button,select,input{margin:8px;padding:8px}
</style>
</head>
<body>
<h2>Probador Virtual de Zapatos</h2>

<div>
<select id="shoe">
<option value="blue">👟 Zapatilla</option>
<option value="brown">🥾 Bota</option>
<option value="black">👞 Mocasín</option>
<option value="pink">👠 Taco</option>
</select>
<input type="range" id="size" min="50" max="200" value="100">
</div>

<div id="container">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
  
const shoeImg = new Image();
shoeImg.src = 'assets/sneaker.png';

let pose;

async function startCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'}},
    audio:false
  });
  video.srcObject=stream;
  await video.play();
}

function drawShoe(x,y,angle,size,color,flip){

  if(!shoeImg.complete) return;

  ctx.save();

  ctx.translate(x,y);
  ctx.rotate(angle);

  if(flip) ctx.scale(-1,1);

  ctx.shadowColor="rgba(0,0,0,.25)";
  ctx.shadowBlur=12;
  ctx.shadowOffsetY=6;

  const w=size*1.4;
  const h=w*0.55;

  ctx.drawImage(
    shoeImg,
    -w/2,
    -h/2,
    w,
    h
  );

  ctx.restore();
}

function onResults(results){
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!results.poseLandmarks) return;

  const lm=results.poseLandmarks;
  const W=canvas.width,H=canvas.height;

  const shoeColor=document.getElementById('shoe').value;
  const scale=parseInt(document.getElementById('size').value)/100;

  function foot(heel,toe,flip){
    const hx=heel.x*W, hy=heel.y*H;
    const tx=toe.x*W, ty=toe.y*H;

    const dx=tx-hx, dy=ty-hy;
    const angle=Math.atan2(dy,dx);

    const footLen=Math.hypot(dx,dy);
    const size=Math.max(footLen*1.15,60)*scale;

    const x=(hx+tx)/2;
    const y=Math.max(hy,ty)-size*0.08;

    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(hx,hy,4,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(tx,ty,4,0,Math.PI*2);
    ctx.fill();

    drawShoe(x,y,angle,size,shoeColor,flip);
  }

  foot(lm[29],lm[31],false);
  foot(lm[30],lm[32],true);
}

async function loop(){
  if(video.readyState>=2){
    await pose.send({image:video});
  }
  requestAnimationFrame(loop);
}

(async()=>{
  await startCamera();

  pose=new Pose({
    locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
  });

  pose.setOptions({
    modelComplexity:1,
    smoothLandmarks:true,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
  });

  pose.onResults(onResults);
  loop();
})();
</script>
</body>
</html>
