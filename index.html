<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probador Virtual de Zapatos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; }

    h1 { text-align: center; font-size: 20px; font-weight: 500; padding: 20px 0 4px; }
    #subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 16px; }

    #viewfinder {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
    }
    #webcam {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }

    #status {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin: 10px 0 14px;
      min-height: 18px;
    }

    #startBtn {
      display: block;
      margin: 0 auto 16px;
      padding: 10px 32px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    #startBtn:hover { background: #f0f0f0; }
    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #shoes {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
      padding: 0 16px;
    }
    .shoe-btn {
      padding: 8px 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .shoe-btn:hover { background: #f0f0f0; }
    .shoe-btn.active { border-color: #378ADD; background: #E6F1FB; color: #0C447C; font-weight: 500; }

    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 10px;
    }
    #controls label { font-size: 13px; color: #666; }
    #scaleSlider { width: 130px; }
    #scaleVal { font-size: 13px; font-weight: 500; min-width: 36px; }

    #tip {
      text-align: center;
      font-size: 12px;
      color: #999;
      padding: 0 16px 24px;
      max-width: 500px;
      margin: 0 auto;
    }

    .wrapper { max-width: 640px; margin: 0 auto; padding: 0 16px; }
  </style>
</head>
<body>

<h1>Probador Virtual de Zapatos</h1>
<p id="subtitle">Mostrá tus pies a la cámara y probate el calzado</p>

<div class="wrapper">
  <div id="viewfinder">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <p id="status">Presioná "Activar cámara" para empezar</p>

  <button id="startBtn">Activar cámara</button>

  <div id="shoes">
    <button class="shoe-btn active" data-shoe="sneaker">👟 Zapatilla</button>
    <button class="shoe-btn" data-shoe="boot">🥾 Bota</button>
    <button class="shoe-btn" data-shoe="loafer">👞 Mocasín</button>
    <button class="shoe-btn" data-shoe="heel">👠 Taco</button>
  </div>

  <div id="controls">
    <label>Tamaño del zapato</label>
    <input type="range" id="scaleSlider" min="50" max="200" value="100" step="1">
    <span id="scaleVal">100%</span>
  </div>

  <p id="tip">Consejo: mostrá los pies completos, con buena iluminación. Funciona mejor apuntando la cámara hacia abajo o frente a un espejo.</p>
</div>

<!-- MediaPipe desde CDN (no requiere instalación) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>

<script>
  const video   = document.getElementById('webcam');
  const canvas  = document.getElementById('overlay');
  const ctx     = canvas.getContext('2d');
  const statusEl  = document.getElementById('status');
  const startBtn  = document.getElementById('startBtn');
  const scaleSlider = document.getElementById('scaleSlider');
  const scaleVal    = document.getElementById('scaleVal');

  let currentShoe = 'sneaker';
  let userScale   = 1.0;
  let cameraStarted = false;

  // --- Paleta de colores por modelo ---
  const shoeColors = {
    sneaker: { body:'#378ADD', sole:'#0C447C', lace:'#ffffff', label:'Zapatilla' },
    boot:    { body:'#5F5E5A', sole:'#2C2C2A', lace:'#B4B2A9', label:'Bota'     },
    loafer:  { body:'#854F0B', sole:'#412402', lace:'#EF9F27', label:'Mocasín'  },
    heel:    { body:'#D4537E', sole:'#4B1528', lace:'#F4C0D1', label:'Taco'     },
  };

  // --- Cambio de modelo ---
  document.querySelectorAll('.shoe-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shoe-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentShoe = btn.dataset.shoe;
    });
  });

  // --- Slider de tamaño ---
  scaleSlider.addEventListener('input', () => {
    userScale = parseInt(scaleSlider.value) / 100;
    scaleVal.textContent = scaleSlider.value + '%';
  });

  // --- Dibujo de zapatos sobre canvas ---
  // cx,cy = centro del pie | angle = ángulo de rotación | width = ancho del pie detectado
  // flip = true para pie derecho (espejo horizontal)
  function drawShoe(cx, cy, angle, width, shoe, flip) {
    const c = shoeColors[shoe];
    const h = width * 0.38;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    if (flip) ctx.scale(-1, 1);
    ctx.scale(userScale, userScale);

    if (shoe === 'sneaker') {
      // Cuerpo
      ctx.beginPath();
      ctx.ellipse(0, 0, width * 0.5, h * 0.42, 0, 0, Math.PI * 2);
      ctx.fillStyle = c.body; ctx.fill();
      // Suela
      ctx.beginPath();
      ctx.ellipse(0, h * 0.28, width * 0.52, h * 0.22, 0, 0, Math.PI * 2);
      ctx.fillStyle = c.sole; ctx.fill();
      // Cordones
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * width * 0.08, -h * 0.1);
        ctx.lineTo(i * width * 0.08 + width * 0.04, -h * 0.35);
        ctx.strokeStyle = c.lace; ctx.lineWidth = width * 0.025; ctx.stroke();
      }
      // Reflejo
      ctx.beginPath();
      ctx.ellipse(width * 0.28, -h * 0.05, width * 0.12, h * 0.18, 0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fill();

    } else if (shoe === 'boot') {
      // Caña
      ctx.beginPath();
      ctx.roundRect(-width * 0.48, -h * 1.1, width * 0.96, h * 1.5, 8);
      ctx.fillStyle = c.body; ctx.fill();
      // Suela
      ctx.beginPath();
      ctx.ellipse(0, h * 0.38, width * 0.5, h * 0.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = c.sole; ctx.fill();
      // Costuras horizontales
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(-width * 0.3, -h * 0.3 + i * h * 0.18);
        ctx.lineTo( width * 0.3, -h * 0.3 + i * h * 0.18);
        ctx.strokeStyle = c.lace; ctx.lineWidth = width * 0.018; ctx.stroke();
      }

    } else if (shoe === 'loafer') {
      // Cuerpo redondeado
      ctx.beginPath();
      ctx.moveTo(-width * 0.5, h * 0.05);
      ctx.bezierCurveTo(-width * 0.5, -h * 0.55, width * 0.5, -h * 0.55, width * 0.5, h * 0.05);
      ctx.bezierCurveTo(width * 0.5, h * 0.35, -width * 0.5, h * 0.35, -width * 0.5, h * 0.05);
      ctx.fillStyle = c.body; ctx.fill();
      // Suela
      ctx.beginPath();
      ctx.ellipse(0, h * 0.35, width * 0.5, h * 0.18, 0, 0, Math.PI * 2);
      ctx.fillStyle = c.sole; ctx.fill();
      // Detalle en el empeine
      ctx.beginPath();
      ctx.moveTo(-width * 0.15, -h * 0.15);
      ctx.quadraticCurveTo(0, -h * 0.45, width * 0.15, -h * 0.15);
      ctx.strokeStyle = c.lace; ctx.lineWidth = width * 0.04; ctx.stroke();

    } else if (shoe === 'heel') {
      // Cuerpo del zapato con taco
      ctx.beginPath();
      ctx.moveTo(-width * 0.45, h * 0.1);
      ctx.bezierCurveTo(-width * 0.5, -h * 0.3, -width * 0.1, -h * 0.55, width * 0.3, -h * 0.45);
      ctx.bezierCurveTo(width * 0.55, -h * 0.35, width * 0.5, h * 0.1, width * 0.45, h * 0.1);
      ctx.closePath();
      ctx.fillStyle = c.body; ctx.fill();
      // Taco
      ctx.beginPath();
      ctx.moveTo(width * 0.25, h * 0.1);
      ctx.lineTo(width * 0.38, h * 0.55);
      ctx.lineTo(width * 0.45, h * 0.55);
      ctx.lineTo(width * 0.38, h * 0.1);
      ctx.fillStyle = c.sole; ctx.fill();
      // Plataforma delantera
      ctx.beginPath();
      ctx.ellipse(-width * 0.05, h * 0.12, width * 0.32, h * 0.1, 0, 0, Math.PI * 2);
      ctx.fillStyle = c.sole; ctx.fill();
    }

    ctx.restore();
  }

  // --- Callback de MediaPipe Pose ---
  function onResults(results) {
    canvas.width  = video.videoWidth  || canvas.offsetWidth;
    canvas.height = video.videoHeight || canvas.offsetHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results.poseLandmarks) {
      statusEl.textContent = 'No se detectó ninguna persona. Mostrá el cuerpo completo.';
      return;
    }

    const lm = results.poseLandmarks;
    const W  = canvas.width;
    const H  = canvas.height;

    // Landmarks de pies: 29=talón izq, 31=punta izq, 30=talón der, 32=punta der
    const leftHeel  = lm[29];
    const leftToe   = lm[31];
    const rightHeel = lm[30];
    const rightToe  = lm[32];

    let detected = 0;

    function drawFoot(heel, toe, flip) {
      if (!heel || !toe) return;
      if (heel.visibility < 0.3 && toe.visibility < 0.3) return;
      detected++;

      const hx = heel.x * W,  hy = heel.y * H;
      const tx = toe.x  * W,  ty = toe.y  * H;
      const cx = (hx + tx) / 2;
      const cy = (hy + ty) / 2;
      const dx = tx - hx,  dy = ty - hy;
      const angle   = Math.atan2(dy, dx);
      const footLen = Math.sqrt(dx * dx + dy * dy);
      const w = Math.max(footLen * 1.1, 60);

      drawShoe(cx, cy, angle, w, currentShoe, flip);
    }

    drawFoot(leftHeel,  leftToe,  false);
    drawFoot(rightHeel, rightToe, true);

    statusEl.textContent = detected > 0
      ? `${detected} pie${detected > 1 ? 's' : ''} detectado${detected > 1 ? 's' : ''} — mostrando: ${shoeColors[currentShoe].label}`
      : 'Mostrá los pies a la cámara (visibilidad insuficiente)';
  }

  // --- Iniciar cámara ---
  startBtn.addEventListener('click', async () => {
    if (cameraStarted) return;
    cameraStarted = true;
    startBtn.disabled = true;
    startBtn.textContent = 'Iniciando...';
    statusEl.textContent = 'Cargando modelo de detección...';

    try {
      const pose = new Pose({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults(onResults);

      const camera = new Camera(video, {
        onFrame: async () => { await pose.send({ image: video }); },
        width: 640,
        height: 480
      });

      await camera.start();
      startBtn.style.display = 'none';
      statusEl.textContent = 'Cámara activa — mostrá los pies';

    } catch (e) {
      statusEl.textContent = 'Error al acceder a la cámara: ' + e.message;
      startBtn.disabled = false;
      startBtn.textContent = 'Reintentar';
      cameraStarted = false;
    }
  });
</script>

</body>
</html>
