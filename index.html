<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probador de Zapatos</title>
<style>
body{font-family:Arial,sans-serif;text-align:center;background:#f5f5f5;margin:0;padding:20px}
#container{position:relative;max-width:800px;margin:auto}
video,canvas{width:100%;border-radius:12px}
canvas{position:absolute;left:0;top:0}
button,select,input{margin:8px;padding:8px}
</style>
</head>
<body>
<h2>Probador Virtual de Zapatos</h2>

<div>
<select id="shoe">
<option value="blue">👟 Zapatilla</option>
<option value="brown">🥾 Bota</option>
<option value="black">👞 Mocasín</option>
<option value="pink">👠 Taco</option>
</select>
<input type="range" id="size" min="50" max="200" value="100">
</div>

<div id="container">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

let pose;

async function startCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'}},
    audio:false
  });
  video.srcObject=stream;
  await video.play();
}

function drawShoe(x,y,angle,size,color,flip){

  ctx.save();

  ctx.translate(x,y);
  ctx.rotate(angle);

  if(false) ctx.scale(-1,1);

  const w = size * 1.2;
  const h = w * 0.45;

  // sombra
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.beginPath();
  ctx.ellipse(0,h*0.25,w*0.55,h*0.15,0,0,Math.PI*2);
  ctx.fill();

  // suela
  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.roundRect(
    -w*0.52,
    -h*0.08,
    w*1.04,
    h*0.45,
    h*0.15
  );
  ctx.fill();

  // cuerpo
  ctx.fillStyle = color;

  ctx.beginPath();

  ctx.moveTo(-w*0.45, h*0.05);

  ctx.quadraticCurveTo(
    -w*0.35,
    -h*0.45,
    0,
    -h*0.35
  );

  ctx.quadraticCurveTo(
    w*0.35,
    -h*0.35,
    w*0.48,
    h*0.05
  );

  ctx.lineTo(w*0.35, h*0.18);

  ctx.lineTo(-w*0.35, h*0.18);

  ctx.closePath();

  ctx.fill();

  // talón
  ctx.fillStyle = "rgba(255,255,255,0.2)";
  ctx.fillRect(
    -w*0.42,
    -h*0.15,
    w*0.08,
    h*0.25
  );

  // cordones
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = Math.max(2,w*0.015);

  for(let i=0;i<4;i++){

    const lx = -w*0.15 + i*w*0.08;

    ctx.beginPath();
    ctx.moveTo(lx,-h*0.08);
    ctx.lineTo(lx+w*0.05,h*0.05);
    ctx.stroke();
  }

  // puntera
  ctx.strokeStyle="rgba(255,255,255,0.35)";
  ctx.lineWidth=Math.max(2,w*0.02);

  ctx.beginPath();
  ctx.arc(
    w*0.28,
    h*0.02,
    h*0.18,
    -1,
    1
  );
  ctx.stroke();

  ctx.restore();
}

function onResults(results){
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!results.poseLandmarks) return;

  const lm=results.poseLandmarks;
  const W=canvas.width,H=canvas.height;

  const shoeColor=document.getElementById('shoe').value;
  const scale=parseInt(document.getElementById('size').value)/100;

  function foot(heel,toe,flip){
    const hx=heel.x*W, hy=heel.y*H;
    const tx=toe.x*W, ty=toe.y*H;

    const dx=tx-hx, dy=ty-hy;
    const angle=Math.atan2(dy,dx);

    const footLen=Math.hypot(dx,dy);
    const size=Math.max(footLen*1.15,60)*scale;

    const x=(hx+tx)/2;
    const y=Math.max(hy,ty)-size*0.08;

    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(hx,hy,4,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(tx,ty,4,0,Math.PI*2);
    ctx.fill();

    drawShoe(x,y,angle,size,shoeColor,flip);
  }

  foot(lm[29],lm[31],false);
  foot(lm[30],lm[32],true);
}

async function loop(){
  if(video.readyState>=2){
    await pose.send({image:video});
  }
  requestAnimationFrame(loop);
}

(async()=>{
  await startCamera();

  pose=new Pose({
    locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
  });

  pose.setOptions({
    modelComplexity:1,
    smoothLandmarks:true,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
  });

  pose.onResults(onResults);
  loop();
})();
</script>
</body>
</html>
