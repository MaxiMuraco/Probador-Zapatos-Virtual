<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probador Virtual de Zapatos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; }
    h1 { text-align: center; font-size: 20px; font-weight: 500; padding: 20px 0 4px; }
    #subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 16px; }
    #viewfinder {
      position: relative; width: 100%; max-width: 600px;
      margin: 0 auto; border-radius: 12px; overflow: hidden;
      background: #000; aspect-ratio: 4/3;
    }
    #webcam { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #flipBtn {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.55); color: #fff; border: none;
      border-radius: 10px; padding: 10px 14px; font-size: 22px;
      cursor: pointer; backdrop-filter: blur(4px);
    }
    #status { text-align: center; font-size: 13px; color: #555; margin: 12px 0 16px; min-height: 18px; }
    #startBtn {
      display: block; margin: 0 auto 20px; padding: 14px 40px;
      border: none; border-radius: 12px; background: #378ADD; color: #fff;
      cursor: pointer; font-size: 16px; font-weight: 500;
      box-shadow: 0 2px 8px rgba(55,138,221,0.35);
    }
    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #shoes {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin: 0 auto 18px; padding: 0 16px; max-width: 600px;
    }
    .shoe-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 14px 10px; border: 2px solid #ddd; border-radius: 14px;
      background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; color: #444;
    }
    .shoe-btn .emoji { font-size: 28px; line-height: 1; }
    .shoe-btn.active { border-color: #378ADD; background: #E6F1FB; color: #0C447C; }
    #controls { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 12px; padding: 0 16px; }
    #controls label { font-size: 13px; color: #666; white-space: nowrap; }
    #scaleSlider { flex: 1; max-width: 160px; }
    #scaleVal { font-size: 13px; font-weight: 600; min-width: 40px; }
    #tip { text-align: center; font-size: 12px; color: #aaa; padding: 0 16px 28px; max-width: 500px; margin: 0 auto; }
    .wrapper { max-width: 640px; margin: 0 auto; padding: 0 16px; }
  </style>
</head>
<body>

<h1>Probador Virtual de Zapatos</h1>
<p id="subtitle">Mostrá tus pies a la cámara y probate el calzado</p>

<div class="wrapper">
  <div id="viewfinder">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <button id="flipBtn" style="display:none">🔄</button>
  </div>
  <p id="status">Presioná el botón para empezar</p>
  <button id="startBtn">Activar cámara</button>
  <div id="shoes">
    <button class="shoe-btn active" data-shoe="sneaker"><span class="emoji">👟</span>Zapatilla</button>
    <button class="shoe-btn" data-shoe="boot"><span class="emoji">🥾</span>Bota</button>
    <button class="shoe-btn" data-shoe="loafer"><span class="emoji">👞</span>Mocasín</button>
    <button class="shoe-btn" data-shoe="heel"><span class="emoji">👠</span>Taco</button>
  </div>
  <div id="controls">
    <label>Tamaño</label>
    <input type="range" id="scaleSlider" min="50" max="200" value="100" step="1">
    <span id="scaleVal">100%</span>
  </div>
  <p id="tip">Usá 🔄 para cambiar entre cámara frontal y trasera.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>

<script>
const video       = document.getElementById('webcam');
const canvas      = document.getElementById('overlay');
const ctx         = canvas.getContext('2d');
const statusEl    = document.getElementById('status');
const startBtn    = document.getElementById('startBtn');
const flipBtn     = document.getElementById('flipBtn');
const scaleSlider = document.getElementById('scaleSlider');
const scaleVal    = document.getElementById('scaleVal');

let currentShoe   = 'sneaker';
let userScale     = 1.0;
let cameraStarted = false;
let facingMode    = 'environment';
let currentStream = null;
let poseInstance  = null;

const COLORS = {
  sneaker: { body:'#378ADD', sole:'#0C447C', lace:'#ffffff', label:'Zapatilla' },
  boot:    { body:'#5F5E5A', sole:'#2C2C2A', lace:'#B4B2A9', label:'Bota'     },
  loafer:  { body:'#854F0B', sole:'#412402', lace:'#EF9F27', label:'Mocasín'  },
  heel:    { body:'#D4537E', sole:'#4B1528', lace:'#F4C0D1', label:'Taco'     },
};

const smoothed = {
  left:  { cx:null, cy:null, angle:null, w:null },
  right: { cx:null, cy:null, angle:null, w:null },
};
const LERP = 0.3;
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpAngle(a,b,t){
  let d=b-a; while(d>Math.PI) d-=2*Math.PI; while(d<-Math.PI) d+=2*Math.PI; return a+d*t;
}
function smoothFoot(side,cx,cy,angle,w){
  const s=smoothed[side];
  if(s.cx===null){s.cx=cx;s.cy=cy;s.angle=angle;s.w=w;}
  else{s.cx=lerp(s.cx,cx,LERP);s.cy=lerp(s.cy,cy,LERP);s.angle=lerpAngle(s.angle,angle,LERP);s.w=lerp(s.w,w,LERP);}
  return s;
}

document.querySelectorAll('.shoe-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shoe-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentShoe = btn.dataset.shoe;
  });
});
scaleSlider.addEventListener('input', () => {
  userScale = parseInt(scaleSlider.value) / 100;
  scaleVal.textContent = scaleSlider.value + '%';
});

function drawShoe(cx, cy, angle, width, shoe, flip) {
  const c = COLORS[shoe];
  const h = width * 0.38;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  if (flip) ctx.scale(-1, 1);
  ctx.scale(userScale, userScale);
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur  = width * 0.08;
  ctx.shadowOffsetY = width * 0.05;

  if (shoe === 'sneaker') {
    ctx.beginPath(); ctx.ellipse(0,h*0.28,width*0.52,h*0.22,0,0,Math.PI*2); ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,0,width*0.5,h*0.42,0,0,Math.PI*2); ctx.fillStyle=c.body; ctx.fill();
    ctx.shadowColor='transparent';
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*width*0.08,-h*0.1);ctx.lineTo(i*width*0.08+width*0.04,-h*0.35);ctx.strokeStyle=c.lace;ctx.lineWidth=width*0.025;ctx.stroke();}
    ctx.beginPath(); ctx.ellipse(width*0.28,-h*0.05,width*0.12,h*0.18,0.3,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();

  } else if (shoe === 'boot') {
    ctx.beginPath(); ctx.roundRect(-width*0.48,-h*1.1,width*0.96,h*1.5,8); ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,h*0.38,width*0.5,h*0.2,0,0,Math.PI*2); ctx.fillStyle=c.sole; ctx.fill();
    ctx.shadowColor='transparent';
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-width*0.3,-h*0.3+i*h*0.18);ctx.lineTo(width*0.3,-h*0.3+i*h*0.18);ctx.strokeStyle=c.lace;ctx.lineWidth=width*0.018;ctx.stroke();}

  } else if (shoe === 'loafer') {
    ctx.beginPath();
    ctx.moveTo(-width*0.5,h*0.05); ctx.bezierCurveTo(-width*0.5,-h*0.55,width*0.5,-h*0.55,width*0.5,h*0.05);
    ctx.bezierCurveTo(width*0.5,h*0.35,-width*0.5,h*0.35,-width*0.5,h*0.05);
    ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,h*0.35,width*0.5,h*0.18,0,0,Math.PI*2); ctx.fillStyle=c.sole; ctx.fill();
    ctx.shadowColor='transparent';
    ctx.beginPath(); ctx.moveTo(-width*0.15,-h*0.15); ctx.quadraticCurveTo(0,-h*0.45,width*0.15,-h*0.15); ctx.strokeStyle=c.lace; ctx.lineWidth=width*0.04; ctx.stroke();

  } else if (shoe === 'heel') {
    ctx.beginPath();
    ctx.moveTo(-width*0.45,h*0.1); ctx.bezierCurveTo(-width*0.5,-h*0.3,-width*0.1,-h*0.55,width*0.3,-h*0.45);
    ctx.bezierCurveTo(width*0.55,-h*0.35,width*0.5,h*0.1,width*0.45,h*0.1); ctx.closePath();
    ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath(); ctx.moveTo(width*0.25,h*0.1); ctx.lineTo(width*0.38,h*0.55); ctx.lineTo(width*0.45,h*0.55); ctx.lineTo(width*0.38,h*0.1); ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath(); ctx.ellipse(-width*0.05,h*0.12,width*0.32,h*0.1,0,0,Math.PI*2); ctx.fillStyle=c.sole; ctx.fill();
  }
  ctx.restore();
}

function onResults(results) {
  canvas.width  = video.videoWidth  || canvas.offsetWidth;
  canvas.height = video.videoHeight || canvas.offsetHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) {
    statusEl.textContent = 'No se detectó ninguna persona. Mostrá el cuerpo completo.';
    return;
  }

  const lm = results.poseLandmarks;
  const W = canvas.width, H = canvas.height;
  let detected = 0;

  function drawFoot(heelLm, toeLm, side, flip) {
    if (!heelLm || !toeLm) return;
    if ((heelLm.visibility??0) < 0.25 && (toeLm.visibility??0) < 0.25) return;

    const hx=heelLm.x*W, hy=heelLm.y*H;
    const tx=toeLm.x*W,  ty=toeLm.y*H;

    // Anclar al punto más bajo visible
    const bottomY = Math.max(hy, ty);
    const midX = (hx+tx)/2;
    const dx=tx-hx, dy=ty-hy;
    const angle=Math.atan2(dy,dx);
    const footLen=Math.sqrt(dx*dx+dy*dy);
    const width=Math.max(footLen*1.15, 55);

    const cx = midX;
    const cy = bottomY - width * 0.22;

    const s = smoothFoot(side, cx, cy, angle, width);
    detected++;
    drawShoe(s.cx, s.cy, s.angle, s.w, currentShoe, flip);
  }

  drawFoot(lm[29], lm[31], 'left',  false);
  drawFoot(lm[30], lm[32], 'right', true);

  statusEl.textContent = detected > 0
    ? `${detected} pie${detected>1?'s':''} detectado${detected>1?'s':''} — ${COLORS[currentShoe].label}`
    : 'Mostrá los pies a la cámara';
}

async function startStream(facing) {
  if (currentStream) { currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  smoothed.left  = {cx:null,cy:null,angle:null,w:null};
  smoothed.right = {cx:null,cy:null,angle:null,w:null};
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:facing},width:{ideal:1280},height:{ideal:720}},audio:false});
  } catch(e) {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing}},audio:false});
  }
  currentStream = stream;
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  await video.play();
}

async function processLoop() {
  if (poseInstance && video.readyState >= 2) await poseInstance.send({ image: video });
  requestAnimationFrame(processLoop);
}

flipBtn.addEventListener('click', async () => {
  flipBtn.disabled = true;
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  statusEl.textContent = facingMode === 'environment' ? 'Cambiando a cámara trasera...' : 'Cambiando a cámara frontal...';
  try {
    await startStream(facingMode);
    statusEl.textContent = facingMode === 'environment' ? '📷 Cámara trasera' : '🤳 Cámara frontal';
  } catch(e) {
    statusEl.textContent = 'No se pudo cambiar: ' + e.message;
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
  }
  flipBtn.disabled = false;
});

startBtn.addEventListener('click', async () => {
  if (cameraStarted) return;
  cameraStarted = true;
  startBtn.disabled = true;
  startBtn.textContent = 'Iniciando...';
  statusEl.textContent = 'Solicitando acceso a la cámara...';
  try {
    await startStream(facingMode);
    statusEl.textContent = 'Cargando modelo de detección...';
    poseInstance = new Pose({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
    });
    poseInstance.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    poseInstance.onResults(onResults);
    startBtn.style.display = 'none';
    flipBtn.style.display  = 'block';
    statusEl.textContent   = '📷 Cámara activa — mostrá los pies';
    processLoop();
  } catch(e) {
    statusEl.textContent = 'Error: ' + e.message;
    startBtn.disabled = false;
    startBtn.textContent = 'Reintentar';
    cameraStarted = false;
  }
});
</script>
</body>
</html>
