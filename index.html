<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probador Virtual de Zapatos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; }
    h1 { text-align: center; font-size: 20px; font-weight: 500; padding: 20px 0 4px; }
    #subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 16px; }
    #viewfinder {
      position: relative; width: 100%; max-width: 600px;
      margin: 0 auto; border-radius: 12px; overflow: hidden;
      background: #000; aspect-ratio: 4/3;
    }
    #webcam { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #flipBtn {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.55); color: #fff; border: none;
      border-radius: 10px; padding: 10px 14px; font-size: 22px;
      cursor: pointer; backdrop-filter: blur(4px);
    }
    #status { text-align: center; font-size: 13px; color: #555; margin: 12px 0 16px; min-height: 18px; }
    #startBtn {
      display: block; margin: 0 auto 20px; padding: 14px 40px;
      border: none; border-radius: 12px; background: #378ADD; color: #fff;
      cursor: pointer; font-size: 16px; font-weight: 500;
      box-shadow: 0 2px 8px rgba(55,138,221,0.35);
      transition: background 0.15s, transform 0.1s;
    }
    #startBtn:active { transform: scale(0.97); }
    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #shoes {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin: 0 auto 18px; padding: 0 16px; max-width: 600px;
    }
    .shoe-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 14px 10px; border: 2px solid #ddd; border-radius: 14px;
      background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
      color: #444; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .shoe-btn .emoji { font-size: 28px; line-height: 1; }
    .shoe-btn:active { transform: scale(0.96); }
    .shoe-btn.active {
      border-color: #378ADD; background: #E6F1FB; color: #0C447C;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
    }
    #controls {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 12px; padding: 0 16px;
    }
    #controls label { font-size: 13px; color: #666; white-space: nowrap; }
    #scaleSlider { flex: 1; max-width: 160px; }
    #scaleVal { font-size: 13px; font-weight: 600; min-width: 40px; }
    #tip { text-align: center; font-size: 12px; color: #aaa; padding: 0 16px 28px; max-width: 500px; margin: 0 auto; }
    .wrapper { max-width: 640px; margin: 0 auto; padding: 0 16px; }
  </style>
</head>
<body>

<h1>Probador Virtual de Zapatos</h1>
<p id="subtitle">Mostrá tus pies a la cámara y probate el calzado</p>

<div class="wrapper">
  <div id="viewfinder">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <button id="flipBtn" style="display:none">🔄</button>
  </div>
  <p id="status">Presioná el botón para empezar</p>
  <button id="startBtn">Activar cámara</button>
  <div id="shoes">
    <button class="shoe-btn active" data-shoe="sneaker"><span class="emoji">👟</span>Zapatilla</button>
    <button class="shoe-btn" data-shoe="boot"><span class="emoji">🥾</span>Bota</button>
    <button class="shoe-btn" data-shoe="loafer"><span class="emoji">👞</span>Mocasín</button>
    <button class="shoe-btn" data-shoe="heel"><span class="emoji">👠</span>Taco</button>
  </div>
  <div id="controls">
    <label>Tamaño</label>
    <input type="range" id="scaleSlider" min="50" max="200" value="100" step="1">
    <span id="scaleVal">100%</span>
  </div>
  <p id="tip">Usá 🔄 para cambiar entre cámara frontal y trasera.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.2.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js"></script>

<script>
const video       = document.getElementById('webcam');
const canvas      = document.getElementById('overlay');
const ctx         = canvas.getContext('2d');
const statusEl    = document.getElementById('status');
const startBtn    = document.getElementById('startBtn');
const flipBtn     = document.getElementById('flipBtn');
const scaleSlider = document.getElementById('scaleSlider');
const scaleVal    = document.getElementById('scaleVal');

let currentShoe   = 'sneaker';
let userScale     = 1.0;
let cameraStarted = false;
let facingMode    = 'environment';
let currentStream = null;
let detector      = null;
let running       = false;

const shoeColors = {
  sneaker: { body:'#378ADD', sole:'#0C447C', lace:'#ffffff', tongue:'#5aaee8', label:'Zapatilla' },
  boot:    { body:'#5F5E5A', sole:'#2C2C2A', lace:'#B4B2A9', tongue:'#4a4a47', label:'Bota'     },
  loafer:  { body:'#854F0B', sole:'#412402', lace:'#EF9F27', tongue:'#a8650e', label:'Mocasín'  },
  heel:    { body:'#D4537E', sole:'#4B1528', lace:'#F4C0D1', tongue:'#e8779b', label:'Taco'     },
};

// Suavizado
const smoothed = {
  left:  { cx:null, cy:null, angle:null, w:null, tilt:null },
  right: { cx:null, cy:null, angle:null, w:null, tilt:null },
};
const LERP = 0.28;
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpAngle(a,b,t){
  let d=b-a;
  while(d>Math.PI) d-=2*Math.PI;
  while(d<-Math.PI) d+=2*Math.PI;
  return a+d*t;
}
function smoothFoot(side,cx,cy,angle,w,tilt){
  const s=smoothed[side];
  if(s.cx===null){s.cx=cx;s.cy=cy;s.angle=angle;s.w=w;s.tilt=tilt;}
  else{
    s.cx=lerp(s.cx,cx,LERP);
    s.cy=lerp(s.cy,cy,LERP);
    s.angle=lerpAngle(s.angle,angle,LERP);
    s.w=lerp(s.w,w,LERP);
    s.tilt=lerp(s.tilt,tilt,LERP);
  }
  return s;
}

document.querySelectorAll('.shoe-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shoe-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentShoe = btn.dataset.shoe;
  });
});
scaleSlider.addEventListener('input', () => {
  userScale = parseInt(scaleSlider.value) / 100;
  scaleVal.textContent = scaleSlider.value + '%';
});

// ─────────────────────────────────────────────
// VISTAS: top (desde arriba), front (puntera), side (perfil)
// tilt: 0=top, 0.5=front, 1=side
// ─────────────────────────────────────────────


function drawBoot(ctx, w, view) {
  const c = shoeColors['boot'];
  const h = w * 0.38;
  if (view === 'top') {
    ctx.beginPath(); ctx.ellipse(0, h*0.15, w*0.5, h*0.22, 0, 0, Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath(); ctx.roundRect(-w*0.44, -h*0.38, w*0.88, h*0.65, 10);
    ctx.fillStyle=c.body; ctx.fill();
    for(let i=0;i<3;i++){
      ctx.beginPath(); ctx.moveTo(-w*0.25, -h*0.25+i*h*0.18); ctx.lineTo(w*0.25, -h*0.25+i*h*0.18);
      ctx.strokeStyle=c.lace; ctx.lineWidth=w*0.015; ctx.stroke();
    }
  } else if (view === 'front') {
    ctx.beginPath(); ctx.roundRect(-w*0.42, -h*1.2, w*0.84, h*1.7, 10);
    ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, h*0.5, w*0.44, h*0.18, 0, 0, Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.moveTo(-w*0.28, -h*0.9+i*h*0.22); ctx.lineTo(w*0.28, -h*0.9+i*h*0.22);
      ctx.strokeStyle=c.lace; ctx.lineWidth=w*0.02; ctx.stroke();
    }
    ctx.beginPath(); ctx.ellipse(w*0.18, -h*0.3, w*0.08, h*0.22, 0.2, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-w*0.45, h*0.28);
    ctx.bezierCurveTo(-w*0.48, -h*0.05, -w*0.4, -h*1.1, -w*0.15, -h*1.15);
    ctx.lineTo(w*0.25, -h*1.15);
    ctx.bezierCurveTo(w*0.42, -h*1.1, w*0.45, -h*0.05, w*0.45, h*0.18);
    ctx.bezierCurveTo(w*0.48, h*0.4, w*0.25, h*0.52, 0, h*0.48);
    ctx.bezierCurveTo(-w*0.3, h*0.52, -w*0.48, h*0.4, -w*0.45, h*0.28);
    ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-w*0.45, h*0.28);
    ctx.bezierCurveTo(-w*0.5, h*0.55, -w*0.28, h*0.68, 0, h*0.65);
    ctx.bezierCurveTo(w*0.28, h*0.68, w*0.5, h*0.55, w*0.45, h*0.28);
    ctx.bezierCurveTo(w*0.25, h*0.52, -w*0.25, h*0.52, -w*0.45, h*0.28);
    ctx.fillStyle=c.sole; ctx.fill();
    for(let i=0;i<4;i++){
      ctx.beginPath(); ctx.moveTo(-w*0.05, -h*0.2-i*h*0.18); ctx.lineTo(w*0.22, -h*0.22-i*h*0.17);
      ctx.strokeStyle=c.lace; ctx.lineWidth=w*0.018; ctx.stroke();
    }
  }
}

function drawLoafer(ctx, w, view) {
  const c = shoeColors['loafer'];
  const h = w * 0.38;
  if (view === 'top') {
    ctx.beginPath(); ctx.ellipse(0, h*0.12, w*0.5, h*0.2, 0, 0, Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-w*0.46, h*0.05);
    ctx.bezierCurveTo(-w*0.46,-h*0.5, w*0.46,-h*0.5, w*0.46,h*0.05);
    ctx.bezierCurveTo(w*0.46,h*0.3, -w*0.46,h*0.3, -w*0.46,h*0.05);
    ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-w*0.12,-h*0.1); ctx.quadraticCurveTo(0,-h*0.42,w*0.12,-h*0.1);
    ctx.strokeStyle=c.lace; ctx.lineWidth=w*0.035; ctx.stroke();
  } else if (view === 'front') {
    ctx.beginPath();
    ctx.moveTo(-w*0.44, h*0.42);
    ctx.bezierCurveTo(-w*0.46, -h*0.05, -w*0.28, -h*0.62, 0, -h*0.65);
    ctx.bezierCurveTo(w*0.28, -h*0.62, w*0.46, -h*0.05, w*0.44, h*0.42);
    ctx.closePath(); ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-w*0.44, h*0.42);
    ctx.bezierCurveTo(-w*0.46, h*0.65, w*0.46, h*0.65, w*0.44, h*0.42);
    ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-w*0.16,-h*0.1); ctx.quadraticCurveTo(0,-h*0.4,w*0.16,-h*0.1);
    ctx.strokeStyle=c.lace; ctx.lineWidth=w*0.04; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(w*0.18, h*0.05, w*0.08, h*0.18, 0.2, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-w*0.46, h*0.22);
    ctx.bezierCurveTo(-w*0.48, -h*0.08, -w*0.2, -h*0.58, w*0.1, -h*0.6);
    ctx.bezierCurveTo(w*0.38, -h*0.58, w*0.5, -h*0.15, w*0.48, h*0.15);
    ctx.bezierCurveTo(w*0.5, h*0.35, w*0.28, h*0.42, 0, h*0.4);
    ctx.bezierCurveTo(-w*0.28, h*0.42, -w*0.48, h*0.35, -w*0.46, h*0.22);
    ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-w*0.46, h*0.22);
    ctx.bezierCurveTo(-w*0.5, h*0.48, -w*0.28, h*0.6, 0, h*0.58);
    ctx.bezierCurveTo(w*0.28, h*0.6, w*0.52, h*0.48, w*0.48, h*0.22);
    ctx.bezierCurveTo(w*0.28, h*0.42, -w*0.28, h*0.42, -w*0.46, h*0.22);
    ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-w*0.05,-h*0.18); ctx.quadraticCurveTo(w*0.15,-h*0.45,w*0.28,-h*0.15);
    ctx.strokeStyle=c.lace; ctx.lineWidth=w*0.038; ctx.stroke();
  }
}

function drawHeel(ctx, w, view) {
  const c = shoeColors['heel'];
  const h = w * 0.38;
  if (view === 'top') {
    ctx.beginPath();
    ctx.moveTo(-w*0.42, h*0.08);
    ctx.bezierCurveTo(-w*0.44,-h*0.48, w*0.3,-h*0.52, w*0.44,h*0.08);
    ctx.bezierCurveTo(w*0.44,h*0.28, -w*0.44,h*0.28, -w*0.42,h*0.08);
    ctx.fillStyle=c.body; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,h*0.22,w*0.42,h*0.16,0,0,Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
    // Taco pequeño al fondo
    ctx.beginPath(); ctx.ellipse(0,-h*0.38,w*0.12,h*0.08,0,0,Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
  } else if (view === 'front') {
    ctx.beginPath();
    ctx.moveTo(-w*0.42, h*0.38);
    ctx.bezierCurveTo(-w*0.44,-h*0.08,-w*0.25,-h*0.68,0,-h*0.7);
    ctx.bezierCurveTo(w*0.25,-h*0.68,w*0.44,-h*0.08,w*0.42,h*0.38);
    ctx.closePath(); ctx.fillStyle=c.body; ctx.fill();
    // Plataforma
    ctx.beginPath(); ctx.ellipse(0,h*0.52,w*0.3,h*0.14,0,0,Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
    // Taco fino al centro-fondo
    ctx.beginPath(); ctx.ellipse(0,h*0.62,w*0.08,h*0.12,0,0,Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath(); ctx.ellipse(w*0.16,h*0.05,w*0.07,h*0.18,0.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-w*0.44, h*0.15);
    ctx.bezierCurveTo(-w*0.46,-h*0.22,-w*0.08,-h*0.58,w*0.28,-h*0.5);
    ctx.bezierCurveTo(w*0.52,-h*0.32,w*0.48,h*0.12,w*0.44,h*0.15);
    ctx.bezierCurveTo(w*0.28,h*0.35,-w*0.28,h*0.35,-w*0.44,h*0.15);
    ctx.fillStyle=c.body; ctx.fill();
    // Plataforma delantera
    ctx.beginPath(); ctx.ellipse(-w*0.06,h*0.28,w*0.3,h*0.1,0,0,Math.PI*2);
    ctx.fillStyle=c.sole; ctx.fill();
    // Taco
    ctx.beginPath();
    ctx.moveTo(w*0.22,h*0.15); ctx.lineTo(w*0.36,h*0.62);
    ctx.lineTo(w*0.44,h*0.62); ctx.lineTo(w*0.38,h*0.15);
    ctx.fillStyle=c.sole; ctx.fill();
    ctx.beginPath(); ctx.ellipse(w*0.1,h*0.0,w*0.07,h*0.2,0.15,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();
  }
}

// Cache de canvas offscreen por vista
const sneakerCache = {};

function buildSneakerCanvas(view, size) {
  const key = `${view}_${size}`;
  if (sneakerCache[key]) return sneakerCache[key];

  const oc = document.createElement('canvas');
  // Proporciones: top es ancha, front y side son más altas
  if (view === 'top')   { oc.width = size * 2.2; oc.height = size * 0.9; }
  if (view === 'front') { oc.width = size * 1.4; oc.height = size * 1.9; }
  if (view === 'side')  { oc.width = size * 2.8; oc.height = size * 1.6; }

  const c2 = oc.getContext('2d');
  const col = shoeColors['sneaker'];

  if (view === 'top') {
    const cx = oc.width/2, cy = oc.height/2;
    const w = size, h = size * 0.42;
    c2.translate(cx, cy);
    // Suela borde
    c2.beginPath(); c2.ellipse(0,h*0.45,w*1.05,h*0.55,0,0,Math.PI*2); c2.fillStyle='#0a3566'; c2.fill();
    // Suela media
    c2.beginPath(); c2.ellipse(0,h*0.3,w*1.02,h*0.48,0,0,Math.PI*2); c2.fillStyle='#1a4f8a'; c2.fill();
    // Cuerpo
    c2.beginPath(); c2.ellipse(0,0,w,h,0,0,Math.PI*2); c2.fillStyle=col.body; c2.fill();
    // Sombra lateral izq
    c2.beginPath(); c2.moveTo(-w,0); c2.bezierCurveTo(-w,h*0.6,-w*0.5,h*0.8,-w*0.2,h*0.7);
    c2.bezierCurveTo(-w*0.6,h*0.5,-w*0.9,h*0.1,-w,0); c2.fillStyle='rgba(0,0,0,0.2)'; c2.fill();
    // Highlight der
    c2.beginPath(); c2.moveTo(w,0); c2.bezierCurveTo(w,h*0.6,w*0.5,h*0.8,w*0.2,h*0.7);
    c2.bezierCurveTo(w*0.6,h*0.5,w*0.9,h*0.1,w,0); c2.fillStyle='rgba(255,255,255,0.12)'; c2.fill();
    // Lengüeta
    c2.beginPath(); c2.ellipse(-w*0.28,-h*0.55,w*0.16,h*0.28,0,0,Math.PI*2); c2.fillStyle=col.tongue; c2.fill();
    // Cordones
    for(let i=-2;i<=2;i++){
      c2.beginPath(); c2.moveTo(i*w*0.13,h*0.05); c2.lineTo(i*w*0.13+w*0.06,-h*0.32);
      c2.strokeStyle=col.lace; c2.lineWidth=w*0.04; c2.stroke();
    }
    // Reflejo
    c2.beginPath(); c2.ellipse(w*0.5,-h*0.2,w*0.22,h*0.18,0,0,Math.PI*2);
    c2.fillStyle='rgba(255,255,255,0.1)'; c2.fill();

  } else if (view === 'front') {
    const cx = oc.width/2, cy = oc.height*0.62;
    const w = size*0.62, h = size*1.15;
    c2.translate(cx, cy);
    // Suela gruesa
    c2.beginPath(); c2.moveTo(-w*0.95,h*0.28); c2.bezierCurveTo(-w,h*0.55,w,h*0.55,w*0.95,h*0.28); c2.fillStyle='#0a3566'; c2.fill();
    // Suela media
    c2.beginPath(); c2.moveTo(-w*0.98,h*0.14); c2.bezierCurveTo(-w*1.02,h*0.38,-w*0.95,h*0.42,0,h*0.44);
    c2.bezierCurveTo(w*0.95,h*0.42,w*1.02,h*0.38,w*0.98,h*0.14);
    c2.bezierCurveTo(w*0.75,h*0.28,0,h*0.3,-0,h*0.3); c2.fillStyle='#1a4f8a'; c2.fill();
    // Cuerpo
    c2.beginPath(); c2.moveTo(-w*0.95,h*0.12);
    c2.bezierCurveTo(-w,-h*0.2,-w*0.6,-h*0.82,0,-h*0.88);
    c2.bezierCurveTo(w*0.6,-h*0.82,w,-h*0.2,w*0.95,h*0.12);
    c2.closePath(); c2.fillStyle=col.body; c2.fill();
    // Sombra lateral der
    c2.beginPath(); c2.moveTo(w*0.36,-h*0.72); c2.bezierCurveTo(w,-h*0.14,w*0.95,h*0.12,w*0.72,h*0.08);
    c2.bezierCurveTo(w*0.72,-h*0.08,w*0.52,-h*0.62,w*0.36,-h*0.72); c2.fillStyle='rgba(0,0,0,0.18)'; c2.fill();
    // Highlight izq
    c2.beginPath(); c2.moveTo(-w*0.36,-h*0.72); c2.bezierCurveTo(-w,-h*0.14,-w*0.95,h*0.12,-w*0.72,h*0.08);
    c2.bezierCurveTo(-w*0.72,-h*0.08,-w*0.52,-h*0.62,-w*0.36,-h*0.72); c2.fillStyle='rgba(255,255,255,0.1)'; c2.fill();
    // Lengüeta
    c2.beginPath(); c2.moveTo(-w*0.24,-h*0.18); c2.bezierCurveTo(-w*0.28,-h*0.78,w*0.28,-h*0.78,w*0.24,-h*0.18);
    c2.fillStyle=col.tongue; c2.fill();
    // Cordones
    for(let i=0;i<4;i++){
      c2.beginPath(); c2.moveTo(-w*0.44,-h*0.06-i*h*0.14); c2.lineTo(w*0.44,-h*0.06-i*h*0.14);
      c2.strokeStyle=col.lace; c2.lineWidth=w*0.07; c2.lineCap='round'; c2.stroke();
    }
    // Costura puntera
    c2.beginPath(); c2.moveTo(-w*0.68,h*0.12); c2.quadraticCurveTo(0,h*0.04,w*0.68,h*0.12);
    c2.strokeStyle='rgba(255,255,255,0.2)'; c2.lineWidth=w*0.04; c2.setLineDash([w*0.08,w*0.05]); c2.stroke(); c2.setLineDash([]);

  } else { // side
    const cx = oc.width/2, cy = oc.height*0.58;
    const w = size*1.3, h = size*0.95;
    c2.translate(cx, cy);
    // Suela inferior gruesa
    c2.beginPath();
    c2.moveTo(-w*0.52,h*0.42); c2.bezierCurveTo(-w*0.56,h*0.62,-w*0.3,h*0.72,w*0.08,h*0.7);
    c2.bezierCurveTo(w*0.38,h*0.68,w*0.56,h*0.56,w*0.52,h*0.4);
    c2.lineTo(w*0.5,h*0.3); c2.bezierCurveTo(w*0.3,h*0.52,w*0.08,h*0.56,-w*0.08,h*0.54);
    c2.bezierCurveTo(-w*0.34,h*0.52,-w*0.5,h*0.42,-w*0.52,h*0.3); c2.closePath();
    c2.fillStyle='#0a3566'; c2.fill();
    // Suela media
    c2.beginPath();
    c2.moveTo(-w*0.5,h*0.28); c2.bezierCurveTo(-w*0.54,h*0.46,-w*0.3,h*0.54,w*0.08,h*0.52);
    c2.bezierCurveTo(w*0.36,h*0.5,w*0.52,h*0.4,w*0.5,h*0.26);
    c2.bezierCurveTo(w*0.3,h*0.42,w*0.08,h*0.46,-w*0.08,h*0.44);
    c2.bezierCurveTo(-w*0.33,h*0.42,-w*0.48,h*0.32,-w*0.5,h*0.28);
    c2.fillStyle='#1a4f8a'; c2.fill();
    // Cuerpo principal
    c2.beginPath();
    c2.moveTo(-w*0.5,h*0.26);
    c2.bezierCurveTo(-w*0.54,-h*0.06,-w*0.38,-h*0.48,-w*0.08,-h*0.6);
    c2.bezierCurveTo(w*0.08,-h*0.68,w*0.22,-h*0.6,w*0.38,-h*0.38);
    c2.bezierCurveTo(w*0.56,-h*0.1,w*0.52,h*0.2,w*0.5,h*0.26);
    c2.bezierCurveTo(w*0.3,h*0.44,w*0.08,h*0.48,-w*0.08,h*0.46);
    c2.bezierCurveTo(-w*0.34,h*0.44,-w*0.5,h*0.32,-w*0.5,h*0.26);
    c2.fillStyle=col.body; c2.fill();
    // Panel talón oscuro
    c2.beginPath();
    c2.moveTo(-w*0.5,h*0.26); c2.bezierCurveTo(-w*0.54,-h*0.06,-w*0.42,-h*0.36,-w*0.26,-h*0.48);
    c2.bezierCurveTo(-w*0.36,-h*0.26,-w*0.38,h*0.04,-w*0.36,h*0.22);
    c2.bezierCurveTo(-w*0.4,h*0.28,-w*0.48,h*0.28,-w*0.5,h*0.26);
    c2.fillStyle='rgba(0,0,0,0.28)'; c2.fill();
    // Panel puntera oscuro
    c2.beginPath();
    c2.moveTo(w*0.2,-h*0.58); c2.bezierCurveTo(w*0.38,-h*0.38,w*0.56,-h*0.1,w*0.5,h*0.26);
    c2.bezierCurveTo(w*0.4,h*0.18,w*0.32,-h*0.06,w*0.18,-h*0.46); c2.closePath();
    c2.fillStyle='rgba(0,0,0,0.22)'; c2.fill();
    // Franja decorativa
    c2.beginPath();
    c2.moveTo(-w*0.2,-h*0.52); c2.bezierCurveTo(w*0.0,-h*0.66,w*0.2,-h*0.58,w*0.3,-h*0.38);
    c2.bezierCurveTo(w*0.08,-h*0.42,-w*0.04,-h*0.46,-w*0.2,-h*0.52);
    c2.fillStyle=col.tongue; c2.globalAlpha=0.8; c2.fill(); c2.globalAlpha=1;
    // Lengüeta
    c2.beginPath();
    c2.moveTo(-w*0.22,-h*0.18); c2.bezierCurveTo(-w*0.26,-h*0.52,-w*0.1,-h*0.6,-w*0.01,-h*0.56);
    c2.bezierCurveTo(w*0.04,-h*0.54,w*0.0,-h*0.2,-w*0.04,-h*0.16);
    c2.fillStyle=col.tongue; c2.fill();
    // Tab del talón
    c2.beginPath();
    c2.moveTo(-w*0.5,h*0.06); c2.bezierCurveTo(-w*0.6,h*0.0,-w*0.58,-h*0.1,-w*0.46,-h*0.08);
    c2.bezierCurveTo(-w*0.48,-h*0.02,-w*0.5,h*0.04,-w*0.5,h*0.06);
    c2.fillStyle='#0a3566'; c2.fill();
    // Costura suela
    c2.beginPath();
    c2.moveTo(-w*0.5,h*0.26); c2.bezierCurveTo(-w*0.08,h*0.44,w*0.08,h*0.46,w*0.5,h*0.26);
    c2.strokeStyle='rgba(255,255,255,0.2)'; c2.lineWidth=w*0.012; c2.setLineDash([w*0.03,w*0.02]); c2.stroke(); c2.setLineDash([]);
    // Reflejo
    c2.beginPath();
    c2.moveTo(w*0.06,-h*0.52); c2.bezierCurveTo(w*0.18,-h*0.56,w*0.28,-h*0.44,w*0.22,-h*0.3);
    c2.bezierCurveTo(w*0.12,-h*0.34,w*0.02,-h*0.44,w*0.06,-h*0.52);
    c2.fillStyle='rgba(255,255,255,0.1)'; c2.fill();
  }

  sneakerCache[key] = oc;
  return oc;
}

// Override drawSneaker para usar offscreen canvas
function drawSneaker(ctx, w, view) {
  const size = Math.round(w * 0.8);
  const oc = buildSneakerCanvas(view, size);
  ctx.drawImage(oc, -oc.width/2, -oc.height/2);
}

const shoeDrawers = { sneaker: drawSneaker, boot: drawBoot, loafer: drawLoafer, heel: drawHeel };

// tilt: 0=top (pie plano), 0.5=front (puntera hacia cámara), 1=side (perfil)
function getView(tilt) {
  if (tilt < 0.35) return 'top';
  if (tilt < 0.65) return 'front';
  return 'side';
}

function drawShoe(cx, cy, angle, width, shoe, flip, tilt) {
  const view = getView(tilt);
  ctx.save();
  ctx.translate(cx, cy);
  if (view === 'top') {
    ctx.rotate(angle);
    if (flip) ctx.scale(-1, 1);
  } else if (view === 'side') {
    if (!flip) ctx.scale(-1, 1);
  }
  ctx.scale(userScale, userScale);
  ctx.shadowColor = 'rgba(0,0,0,0.28)';
  ctx.shadowBlur  = width * 0.07;
  ctx.shadowOffsetY = width * 0.04;
  shoeDrawers[shoe](ctx, width, view);
  ctx.restore();
}

function getKp(keypoints, name) {
  return keypoints.find(k => k.name === name);
}

function drawFoot(heel, toe, ankle, knee, side, flip, W, H) {
  if (!heel || !toe) return false;
  if ((heel.score??0) < 0.25 && (toe.score??0) < 0.25) return false;

  const hx=heel.x, hy=heel.y, tx=toe.x, ty=toe.y;
  const midX=(hx+tx)/2, midY=(hy+ty)/2;
  const dx=tx-hx, dy=ty-hy;
  const angle=Math.atan2(dy,dx);
  const footLen=Math.sqrt(dx*dx+dy*dy);
  const width=Math.max(footLen*1.2, 50);

  // Calcular tilt
  let tilt = 0.4;
  if (ankle && knee && (ankle.score??0)>0.25 && (knee.score??0)>0.25) {
    const legDy=Math.abs(ankle.y-knee.y);
    const legDx=Math.abs(ankle.x-knee.x);
    tilt=Math.min(1, legDy/(legDx+legDy+0.001));
    tilt=Math.max(0, Math.min(1, tilt));
  } else {
    const absAngle=Math.abs(angle);
    const norm=Math.min(absAngle, Math.PI-absAngle);
    tilt=Math.max(0.15, Math.min(0.85, norm/(Math.PI/2)));
  }

  // Anclar al punto MÁS BAJO del pie visible en la imagen (máximo Y)
  // Esto ignora los errores de BlazePose en coordenadas Y y usa el pixel real más bajo
  const candidates = [heel, toe];
  if (ankle && (ankle.score??0) > 0.2) candidates.push(ankle);
  const bottomY = Math.max(...candidates.map(k => k.y));
  const bottomX = candidates.reduce((best, k) => k.y === bottomY ? k : best, heel).x;

  // Centro X sigue siendo el medio del pie, pero Y se ancla al punto más bajo
  const anchorX = midX;
  const anchorY = bottomY;

  // Pequeño offset hacia arriba para que el zapato se apoye SOBRE el pie, no debajo
  const fwdX=Math.cos(angle), fwdY=Math.sin(angle);
  const cx = anchorX + fwdX * width * 0.03;
  const cy = anchorY - width * lerp(0.28, 0.18, tilt);

  const s = smoothFoot(side, cx, cy, angle, width, tilt);
  drawShoe(s.cx, s.cy, s.angle, s.w, currentShoe, flip, s.tilt);
  return true;
}

async function detectionLoop() {
  if (!running || !detector) return;
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  try {
    const poses = await detector.estimatePoses(video, { flipHorizontal: false });
    if (poses && poses.length > 0) {
      const kps=poses[0].keypoints, W=canvas.width, H=canvas.height;
      const lH=getKp(kps,'left_heel'),  lT=getKp(kps,'left_foot_index');
      const lA=getKp(kps,'left_ankle'), lK=getKp(kps,'left_knee');
      const rH=getKp(kps,'right_heel'), rT=getKp(kps,'right_foot_index');
      const rA=getKp(kps,'right_ankle'),rK=getKp(kps,'right_knee');
      let detected=0;
      if(drawFoot(lH,lT,lA,lK,'left', false,W,H)) detected++;
      if(drawFoot(rH,rT,rA,rK,'right',true, W,H)) detected++;
      statusEl.textContent = detected>0
        ? `${detected} pie${detected>1?'s':''} detectado${detected>1?'s':''} — ${shoeColors[currentShoe].label}`
        : 'Mostrá los pies a la cámara';
    } else {
      statusEl.textContent='No se detectó ninguna persona.';
    }
  } catch(e) {}
  requestAnimationFrame(detectionLoop);
}

async function startStream(facing) {
  if(currentStream){currentStream.getTracks().forEach(t=>t.stop());currentStream=null;}
  smoothed.left ={cx:null,cy:null,angle:null,w:null,tilt:null};
  smoothed.right={cx:null,cy:null,angle:null,w:null,tilt:null};
  let stream;
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:facing},width:{ideal:1280},height:{ideal:720}},audio:false});
  }catch(e){
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing}},audio:false});
  }
  currentStream=stream; video.srcObject=stream;
  await new Promise(resolve=>{video.onloadedmetadata=resolve;});
  await video.play();
}

flipBtn.addEventListener('click',async()=>{
  flipBtn.disabled=true;
  facingMode=facingMode==='environment'?'user':'environment';
  statusEl.textContent=facingMode==='environment'?'Cambiando a cámara trasera...':'Cambiando a cámara frontal...';
  try{
    await startStream(facingMode);
    statusEl.textContent=facingMode==='environment'?'📷 Cámara trasera activa':'🤳 Cámara frontal activa';
  }catch(e){
    statusEl.textContent='No se pudo cambiar: '+e.message;
    facingMode=facingMode==='environment'?'user':'environment';
  }
  flipBtn.disabled=false;
});

startBtn.addEventListener('click',async()=>{
  if(cameraStarted) return;
  cameraStarted=true; startBtn.disabled=true; startBtn.textContent='Iniciando...';
  statusEl.textContent='Solicitando acceso a la cámara...';
  try{
    await startStream(facingMode);
    statusEl.textContent='Cargando modelo TensorFlow...';
    await tf.ready();
    detector=await poseDetection.createDetector(
      poseDetection.SupportedModels.BlazePose,
      {runtime:'tfjs',modelType:'full',enableSmoothing:true}
    );
    startBtn.style.display='none'; flipBtn.style.display='block';
    statusEl.textContent='📷 Cámara activa — mostrá los pies';
    running=true; detectionLoop();
  }catch(e){
    statusEl.textContent='Error: '+e.message;
    startBtn.disabled=false; startBtn.textContent='Reintentar'; cameraStarted=false;
  }
});
</script>
