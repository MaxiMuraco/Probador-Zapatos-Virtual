<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prototipo Try-On Zapatos</title>
  <style>
    body { margin: 0; overflow: hidden; }
    video, canvas { position: absolute; top: 0; left: 0; }
    canvas { pointer-events: none; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script type="module">
    import { Pose } from "https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js";
    import { Camera } from "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // Ajustar tamaño al viewport
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    // Imagen de zapato embebida en base64 (PNG con fondo transparente)
    const shoeImg = new Image();
    shoeImg.src =
      "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIA..."; // aquí iría el PNG codificado

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

      const lm = results.poseLandmarks;
      if (!lm) return;

      // Pie izquierdo
      const heel = lm[29];
      const index = lm[31];

      const cx = (heel.x + index.x) / 2 * canvas.width;
      const cy = (heel.y + index.y) / 2 * canvas.height;
      const angle = Math.atan2(index.y - heel.y, index.x - heel.x);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.drawImage(shoeImg, -50, -50, 100, 100); // tamaño ajustable
      ctx.restore();
    });

    const camera = new Camera(video, {
      onFrame: async () => { await pose.send({ image: video }); },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
